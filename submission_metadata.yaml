ai_usage_summary: |
  Used Claude and ChatGPT for architectural discussion, and GLM-5.2 for code generation, debugging and error handling.
  No candidate data was fed to any LLM. The final ranking pipeline is 100% deterministic, 
  CPU-only, and uses rule-based heuristics, regex matching, and schema validation.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Fully deterministic, CPU-only candidate ranking pipeline with zero LLM or network calls at
  inference time. Candidates are streamed line-by-line from a JSONL file and pre-validated
  against a compiled JSON schema (fastjsonschema) before any scoring occurs.

  Scoring uses a six-component weighted additive model: technical depth + JD word-overlap
  (35%), retrieval systems expertise via curated keyword matching — Pinecone, FAISS,
  Weaviate, Qdrant, Elasticsearch (20%), ranking/evaluation knowledge — NDCG, MRR, LTR
  (15%), production and startup DNA signals (10%), Redrob platform engagement signals
  — open-to-work flag, recruiter response rate, saves (5%), and location/relocation
  availability (5%).

  A dedicated honeypot module applies a penalty of up to -10% for fabricated experience
  (inflated YOE vs. career history, expert skills with zero months usage, impossible
  timelines). A hard 50% score multiplier penalises consulting-only or pure-research
  backgrounds explicitly excluded by the JD.

  Top-100 selection uses a min-heap (heapq) for O(n log 100) time and O(100) space.
  Every ranked candidate receives a grounded, fact-derived reasoning string. Runtime is
  approximately 10 seconds for 50,000 candidates on a single CPU core.

